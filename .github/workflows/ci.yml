name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: routerdash-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_YES: "1"

jobs:
  version-gate:
    name: Version Gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_exists: ${{ steps.release.outputs.exists }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]+$ ]]; then
            echo "VERSION must match YYYY.MM.DD-N, got: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check GitHub releases
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          exists=false
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exists=true
          elif gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exists=true
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
          if [[ "$exists" == "true" && "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
            echo "Release $VERSION already exists. Bump VERSION before building another release artifact." >&2
            exit 1
          fi

  check:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        shell: bash
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install workspace tools
        shell: bash
        run: |
          mise trust -a
          mise install

      - name: Install dependencies
        run: mise run setup

      - name: Run gates
        run: mise run check

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - version-gate
      - check
    if: needs.version-gate.outputs.release_exists != 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        shell: bash
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install workspace tools
        shell: bash
        run: |
          mise trust -a
          mise install

      - name: Install dependencies
        run: mise run setup

      - name: Build versioned packages
        run: |
          mise run pack
          mise run pack-arm64

      - name: Verify stamped version
        env:
          VERSION: ${{ needs.version-gate.outputs.version }}
        shell: bash
        run: |
          ROUTERDASH_FAKE=1 ROUTERDASH_ADDR=127.0.0.1:18080 ./dist/routerdash-linux-amd64/routerdash &
          pid="$!"
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for _ in {1..50}; do
            if curl -fsS http://127.0.0.1:18080/api/version | grep -F "\"$VERSION\"" >/dev/null; then
              exit 0
            fi
            sleep 0.2
          done
          echo "Built binary did not report version $VERSION" >&2
          exit 1

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: routerdash-${{ needs.version-gate.outputs.version }}
          path: |
            dist/routerdash-${{ needs.version-gate.outputs.version }}-linux-amd64.tar.gz
            dist/routerdash-${{ needs.version-gate.outputs.version }}-linux-arm64.tar.gz
          if-no-files-found: error
