<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Router">
  <style>
    :root {
      --router-accent: #008f5a;
      --router-foreground: #102018;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --router-accent: #36d17d;
        --router-foreground: #f2faf5;
      }
    }

    .router-fill {
      fill: var(--router-accent);
    }

    .router-stroke {
      fill: none;
      stroke: var(--router-foreground);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
  <rect class="router-fill" x="7" y="7" width="10" height="12" rx="1" />
  <line class="router-stroke" x1="12.05" y1="12" x2="11.95" y2="12" stroke-width="2.5" />
  <path class="router-stroke" d="M21 12h-4M3 12h4M21 5v8M3 5v8" stroke-width="2" />
  <rect class="router-stroke" x="7" y="7" width="10" height="12" rx="1" stroke-width="2" />
</svg>
